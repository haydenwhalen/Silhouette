# =============================================================================
# Silhouette — User Query Pattern Library
# =============================================================================
# Realistic user phrasings, each linked to a need_id in corpus/user_need_patterns.yaml.
# Used by scripts/analyze-user-need-coverage.ts to probe the REAL retrieval engine and
# measure whether the corpus serves each need.
#
# KEPT SEPARATE from user_need_patterns.yaml on purpose: when real beta data exists,
# these author-written queries get REPLACED by real ones (source: beta_real) without
# touching the need model.
#
# HONESTY: every query here is author-written or doc-derived — NOT a real user log.
#   source vocabulary: raw_pool | intake_example | resonance_example | magnet_probe
#                      | calibration_case | curator_hypothesis
#   (beta_real is reserved for future real queries; none exist yet.)
#
# Fields: query_id · need_id · text · source · expected_state · expected_resonance
#         · expected_insight_type · excluded_voice_registers · notes
#   expected_resonance      = the voice_register the result SHOULD have (from the need)
#   excluded_voice_registers = registers that, if served, count as a resonance MISMATCH
# =============================================================================

meta:
  layer: user-need-coverage
  status: hypothesis
  note: >-
    Author-written / doc-derived queries, not real user logs. Many are taken verbatim from
    scripts/lib/magnet-probes.ts (themselves labeled "not real user logs"). Replaceable by
    real beta queries later.


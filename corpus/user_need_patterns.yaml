      verdict) from someone who lived the same self-judgment. The state is well-stocked but skewed to
      the wrong register for this user.
    covered_by_sio_ids: []
    coverage_strength: unknown
    coverage_evidence: "computed by analyze-user-need-coverage.ts"
    missing_source_profile: >-
      A credible person who was stuck in the knowing-doing gap, framed it as belief/identity (not a

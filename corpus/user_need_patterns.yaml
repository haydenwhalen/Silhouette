    covered_by_sio_ids: []
    coverage_strength: unknown
    coverage_evidence: "computed by analyze-user-need-coverage.ts"
    missing_source_profile: >-
      Research-grounded explanation of why engagement/motivation fades (reward systems), expert
      register. (Likely already covered — analyzer should confirm strength.)
    harvesting_priority: 25

  # ────────────────────────────── INACTION LOOP ──────────────────────────────

    situational_context: [career, mid-career]
    emotional_texture: [self-criticism, frustration, guilt]
    hidden_beliefs:
      - "I should still care about this and my not caring is a personal failing."
      - "Other people manage to stay engaged; I'm the problem."
    user_question_under_it: "Why can't I make myself care, and what does it say about me that I can't?"
    recommended_insight_type: [permission, reframe]
    recommended_voice_register: warm/affirming
    excluded_voice_registers: [direct/challenging]
    resonance_need: warm-permission
    recommended_intensity: mild
    disambiguation_neighbors: [inaction-loop]
    anti_pattern_notes: >-
      A direct/challenging insight here CONFIRMS the self-attack — exclude it. Contrast with

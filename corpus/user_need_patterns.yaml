    covered_by_sio_ids: []
    coverage_strength: unknown
    coverage_evidence: "computed by analyze-user-need-coverage.ts"
    missing_source_profile: >-
      A warm, credible voice that removes the moral charge from disengagement (it's depletion/
      mismatch, not a character defect) before reframing.
    harvesting_priority: 50

  - need_id: ed-running-on-fumes-guilt
    state: engagement-drought
    variant: null
    sub_state: depleted-stopping-feels-like-failing
    status: hypothesis
    source_provenance:
      - "magnet-probes.ts:engagement-drought#3 (running on fumes, stopping feels like failing)"

# =============================================================================
# Silhouette — User Need Pattern Catalog
# =============================================================================
# Back-office harvesting/evaluation artifact for the SIO Discovery Agent.
# Read ai/guides/user_need_pattern_map.md before editing.
#
# HONESTY DISCIPLINE:
#   - Every need is status: hypothesis. NONE is "observed" — we have no real user
#     data yet. Only real beta data may promote a need to observed (one-way, human-gated).
#   - Every need cites source_provenance pointing to a real line in the project docs
#     (user_problem_model.md, intake_diagnostic_flow.md, user_resonance_model.md),
#     the author-written magnet probes, or a documented live-corpus signal.
#   - Needs are SITUATIONAL, never demographic. No personas.
#   - covered_by_sio_ids / coverage_strength / coverage_evidence are seeded as
#     "unknown"/"[]" and are COMPUTED by scripts/analyze-user-need-coverage.ts.
#     The analyzer's report is the source of truth for coverage, not these seeds.
#
# Controlled vocabularies (see methodology §3):
#   state:                 direction-collapse | engagement-drought | inaction-loop
#                          | possibility-paralysis | identity-transition | momentum-gap  (6-state buildout)
#   recommended_insight_type:   reframe | permission | mechanism | story
#   voice_register:        direct/challenging | warm/affirming | intellectual/measured
#                          | vulnerable/personal | expert/scientific
#   recommended_intensity: mild | moderate | intense
#   resonance_need:        direct-challenge | warm-permission | expert-mechanism
#                          | vulnerable-story | intellectual-reframe
#   coverage_strength:     unknown | none | weak | partial | strong   (analyzer-computed)
# =============================================================================

meta:
  layer: user-need-coverage
  status: hypothesis
  mvp_states: [direction-collapse, engagement-drought, inaction-loop]
  expanded_states: [possibility-paralysis, identity-transition, momentum-gap]  # Six-State Buildout (2026-05-26)
  all_states: [direction-collapse, engagement-drought, inaction-loop, possibility-paralysis, identity-transition, momentum-gap]
  caps: { max_needs_per_state: 6, max_total: 36 }
  created_at: "2026-05-26"
  note: >-
    All needs below are curator hypotheses grounded in existing project research. They are NOT
    measurements of real users. Coverage fields are recomputed by analyze-user-need-coverage.ts.

needs:
  # ──────────────────────────── DIRECTION COLLAPSE ────────────────────────────
  - need_id: dc-post-achievement-hollow
    state: direction-collapse
    variant: post-achievement
    sub_state: hit-the-goal-felt-nothing
    status: hypothesis
    source_provenance:
      - "user_problem_model.md#raw-description-2 (hit the thing I said I wanted, feel the same/worse)"
      - "user_problem_model.md#direction-collapse/variant-A-post-achievement"
      - "intake_diagnostic_flow.md#good-input (promoted six months ago, feels hollow)"
    situational_context: [post-achievement, career, mid-career]
    emotional_texture: [numbness, confusion, disappointment]
    hidden_beliefs:
      - "I got what I said I wanted and feel nothing — something must be wrong with me."
      - "There's supposed to be a next thing and I don't have one."
    user_question_under_it: "I reached it and felt nothing — was it the wrong target, or is it me?"
    recommended_insight_type: [story, reframe]
    recommended_voice_register: vulnerable/personal
    excluded_voice_registers: [expert/scientific]
    resonance_need: vulnerable-story
    recommended_intensity: mild
    disambiguation_neighbors: [engagement-drought, identity-transition]
    anti_pattern_notes: >-
      Do NOT open with advice, a values exercise, or the word "passion". A clinical/expert
      mechanism reads as cold here — the user needs the hollow-on-arrival experience named as
      coherent (data about a wrong target), not explained neurochemically.
    covered_by_sio_ids: []
    coverage_strength: unknown
    coverage_evidence: "computed by analyze-user-need-coverage.ts"
    missing_source_profile: >-
      A credible person who reached a milestone they worked years for and felt empty on arrival,
      who can say from the inside that the emptiness was signal, not failure. Vulnerable register.
    harvesting_priority: 55

  - need_id: dc-original-never-knew
    state: direction-collapse
    variant: original
    sub_state: never-had-a-clear-pull
    status: hypothesis
    source_provenance:
      - "user_problem_model.md#raw-description-3 (everyone seems to have figured something out)"
      - "user_problem_model.md#raw-description-5 (don't know how to want differently than I was taught)"
      - "user_problem_model.md#direction-collapse/variant-B-original"
    situational_context: [career, early-career, faith-meaning]
    emotional_texture: [confusion, disappointment, self-criticism]
    hidden_beliefs:
      - "Everyone else got a direction and I never did."
      - "If I don't have a passion by now, I'm broken."
    user_question_under_it: "How do people who never had a clear pull actually build one?"
    recommended_insight_type: [reframe, story]
    recommended_voice_register: intellectual/measured
    excluded_voice_registers: [direct/challenging]
    resonance_need: intellectual-reframe
    recommended_intensity: mild
    disambiguation_neighbors: [momentum-gap, engagement-drought]
    anti_pattern_notes: >-
      Do NOT prescribe a purpose-finding exercise or tell them to "follow their passion". A
      challenging register reads as shaming someone already comparing themselves down. The reframe
      should be that direction is built by doing/noticing, from someone who started directionless.
    covered_by_sio_ids: []
    coverage_strength: unknown
    coverage_evidence: "computed by analyze-user-need-coverage.ts"
    missing_source_profile: >-
      A credible person who was genuinely directionless early and built direction through action
      and iteration (not introspection), speaking measured/intellectual rather than confrontational.
    harvesting_priority: 50

  - need_id: dc-living-someone-elses-life
    state: direction-collapse
    variant: original
    sub_state: did-everything-right-feels-borrowed
    status: hypothesis
    source_provenance:
      - "user_problem_model.md#raw-description-5 (living someone else's life I ended up in)"
      - "user_problem_model.md#how-the-user-describes-it (I feel like I'm living someone else's life)"
    situational_context: [career, identity-shift, faith-meaning]
    emotional_texture: [confusion, restlessness, disappointment]
    hidden_beliefs:
      - "I made all the right decisions and they added up to a life that isn't mine."
      - "I don't know how to want something other than what I was taught to want."
    user_question_under_it: "Whose life am I living, and how would I even know what mine looks like?"
    recommended_insight_type: [story, reframe]
    recommended_voice_register: vulnerable/personal
    excluded_voice_registers: [expert/scientific]
    resonance_need: vulnerable-story
    recommended_intensity: moderate
    disambiguation_neighbors: [identity-transition, engagement-drought]
    anti_pattern_notes: >-
      Do NOT jump to "here's how to find yourself" frameworks. Avoid clinical mechanism. Needs a
      lived account of separating inherited wants from one's own.
    covered_by_sio_ids: []
    coverage_strength: unknown
    coverage_evidence: "computed by analyze-user-need-coverage.ts"
    missing_source_profile: >-
      Someone who realized they were living a scripted/inherited life and can describe, vulnerably,
      how they began to tell their own wants from the borrowed ones.
    harvesting_priority: 50

  - need_id: dc-purpose-search-fatigue
    state: direction-collapse
    variant: original
    sub_state: frantic-searching-not-working
    status: hypothesis
    source_provenance:
      - "user_problem_model.md#raw-description-3 (googling 'how do I find my purpose' at 11pm)"
      - "intake_diagnostic_flow.md#resonance (I've read everything → more information won't help)"
    situational_context: [career, faith-meaning, health-routine]
    emotional_texture: [pressure, exhaustion, confusion]
    hidden_beliefs:
      - "If I just read/journal/assess enough, the answer will appear."
      - "Everyone else found it the normal way and I'm failing at the search."
    user_question_under_it: "Why hasn't all this searching for my purpose produced one?"
    recommended_insight_type: [reframe, permission]
    recommended_voice_register: intellectual/measured
    excluded_voice_registers: []
    resonance_need: intellectual-reframe
    recommended_intensity: mild
    disambiguation_neighbors: [inaction-loop]
    anti_pattern_notes: >-
      Do NOT hand them another framework, assessment, or "5 steps to find your purpose" — that IS
      the trap. The reframe must relieve the search itself (direction emerges from engagement, not
      from more introspection).
    covered_by_sio_ids: []
    coverage_strength: unknown
    coverage_evidence: "computed by analyze-user-need-coverage.ts"
    missing_source_profile: >-
      A credible voice that explicitly de-emphasizes introspective purpose-hunting and reframes
      direction as a by-product of action/attention. Measured, non-prescriptive.
    harvesting_priority: 45

  - need_id: dc-disconnected-trading-time
    state: direction-collapse
    variant: post-achievement
    sub_state: no-larger-purpose-trading-time-for-money
    status: hypothesis
    source_provenance:
      - "user_problem_model.md#raw-description-12 (disconnected from any larger purpose, trading time for money)"
      - "user_problem_model.md#disambiguation (Direction Collapse vs Engagement Drought — hardest pair)"
    situational_context: [career, mid-career, faith-meaning]
    emotional_texture: [numbness, disappointment, restlessness]
    hidden_beliefs:
      - "I'm just trading time for money like everyone, but I thought I'd have found something better."
      - "Caring about the company's mission is naive, but not caring about anything feels worse."
    user_question_under_it: "Is it that I lost the meaning, or that there was never any to begin with?"
    recommended_insight_type: [reframe, story]
    recommended_voice_register: intellectual/measured
    excluded_voice_registers: []
    resonance_need: intellectual-reframe
    recommended_intensity: moderate
    disambiguation_neighbors: [engagement-drought]
    anti_pattern_notes: >-
      This is the canonical DC/ED confusion. A retrieval result that assumes a still-loved target
      (ED framing: "rekindle it") misses — there is no target here. Watch for ED magnets winning this.
    covered_by_sio_ids: []
    coverage_strength: unknown
    coverage_evidence: "computed by analyze-user-need-coverage.ts"
    missing_source_profile: >-
      A reframe on how meaning relates to work for people who never located a "larger purpose",
      distinct from re-engagement advice that presumes a target still exists.
    harvesting_priority: 55

  # ──────────────────────────── ENGAGEMENT DROUGHT ────────────────────────────
  - need_id: ed-resentful-trapped
    state: engagement-drought
    variant: null
    sub_state: meaning-loss-with-resentment-and-sunk-cost
    status: hypothesis
    source_provenance:
      - "user_problem_model.md#raw-description-1 (good at job, feel nothing, didn't choose this)"
      - "magnet-probes.ts:engagement-drought#5 (no say in how I do it, nothing building toward anything)"
      - "live:corpus_gap_detection_report.md (engagement-drought has NO direct/challenging SIO)"
      - "live:cand-mckeown-floor-disengagement.yaml (held magnet names numbness, not resentment)"
    situational_context: [career, post-mastery, mid-career]
    emotional_texture: [resentment, numbness, frustration]
    hidden_beliefs:
      - "Leaving would waste the years I've put in."
      - "I should still care about this and the fact that I don't makes me bitter."
    user_question_under_it: "Am I trapped here, or am I keeping myself here for reasons that don't hold up?"
    recommended_insight_type: [reframe, permission]
    recommended_voice_register: direct/challenging
    excluded_voice_registers: [warm/affirming]
    resonance_need: direct-challenge
    recommended_intensity: moderate
    disambiguation_neighbors: [direction-collapse, identity-transition]
    anti_pattern_notes: >-
      Do NOT offer motivation tips, "find a hobby", or gentle reassurance — to a resentful user
      warmth reads as dismissive. The insight must name the sunk-cost trap directly without
      dismissing real fatigue. Distinct from McKeown's "supermarket floor" (numbness, not the trap).
    covered_by_sio_ids: []
    coverage_strength: unknown
    coverage_evidence: "computed by analyze-user-need-coverage.ts"
    missing_source_profile: >-
      A credible person who left mastered/high-status work and can name, directly, the sunk-cost
      trap and meaning-loss — challenging register, without contempt for the user's exhaustion.
    harvesting_priority: 95

  - need_id: ed-numb-confused-whats-wrong
    state: engagement-drought
    variant: null
    sub_state: cant-name-it-not-depression-not-okay
    status: hypothesis
    source_provenance:
      - "magnet-probes.ts:engagement-drought#8 (numb about everything, can't tell if it's the job or me)"
      - "magnet-probes.ts:engagement-drought#6 (not depression exactly, more like static)"

    emotional_texture: [numbness, confusion, exhaustion]
    hidden_beliefs:
      - "It's not depression but it's not normal either, and I can't even describe it."
      - "What's wrong with me that I can't name what I'm feeling?"
    user_question_under_it: "Is there even a name for this flat, in-between feeling?"
    recommended_insight_type: [reframe, mechanism]
    recommended_voice_register: intellectual/measured
    excluded_voice_registers: []
    resonance_need: intellectual-reframe
    recommended_intensity: mild
    disambiguation_neighbors: [direction-collapse]
    anti_pattern_notes: >-
      Safety-adjacent: if input tips into clinical depression signals, route to safety per intake §10,

    recommended_insight_type: [permission, reframe]
    recommended_voice_register: warm/affirming
    excluded_voice_registers: [direct/challenging]
    resonance_need: warm-permission
    recommended_intensity: mild
    disambiguation_neighbors: [inaction-loop]
    anti_pattern_notes: >-
      Safety-adjacent (clinical burnout → Tier 2). For in-scope users, exclude direct/challenging
      and intensity above mild — they are depleted, not lazy. Permission to rest precedes any push.
    covered_by_sio_ids: []
    coverage_strength: unknown
    coverage_evidence: "computed by analyze-user-need-coverage.ts"
    missing_source_profile: >-
      A credible voice that reframes depletion as a signal to be honored (not weakness) and gives
      explicit permission to stop — warm/vulnerable, gentle intensity.
    harvesting_priority: 45

  - need_id: ed-wants-the-science

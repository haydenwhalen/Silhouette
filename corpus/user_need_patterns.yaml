    covered_by_sio_ids: []
    coverage_strength: unknown
    coverage_evidence: "computed by analyze-user-need-coverage.ts"
    missing_source_profile: >-
      A credible voice that precisely names the flat in-between state (distinct from depression and
      burnout) and validates it as recognizable — measured/intellectual, accessible.
    harvesting_priority: 40

  - need_id: ed-furious-at-self-for-not-caring
    state: engagement-drought
    variant: null
    sub_state: self-blame-for-being-checked-out
    status: hypothesis
    source_provenance:
      - "magnet-probes.ts:engagement-drought#2 (furious with myself for being so checked out)"

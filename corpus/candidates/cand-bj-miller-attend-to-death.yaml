transcript_excerpt: >-
  So the sort of secret is that paying attention to the fact that you die can help you live a lot
  better.
quote_type: verbatim
candidate_moment_summary: >
  Miller, a palliative care physician who has accompanied roughly a thousand people through dying,
  offers the perspective he's earned at the edge of life: the people most clear about what their
  life is for are the ones paying attention to the fact that it ends. For someone in
  direction-collapse — stalled, unsure what they're building toward, waiting for clarity to arrive —
  his move isn't a five-year plan or a passion test. It's to let mortality sharpen the question: if
  you were paying attention to the clock, what would you stop squandering, and what would suddenly
  matter? Direction comes from contact with finitude, not from more deliberation.
key_claim: >-
  The people clearest about how to live are the ones paying attention to the fact that they die. If
  you feel lost about what you're building toward, you don't need a better plan — you need to let
  the fact that your time is finite tell you what actually matters and what you've been squandering.
why_it_might_land: >-
  For the direction-collapse user drowning in options and deferral, a doctor who has sat with a
  thousand deaths cuts through the noise with something no productivity framework can: the clock. It
  reframes "I don't know what I want" as "I haven't let myself feel that this ends" — gently, from
  someone who has earned the right to say it.
user_problem_match_notes: >-
  Direction-collapse where the user is stalled and over-deliberating about what matters. Miller's
  mortality-perspective relocates the source of direction from analysis to finitude. Vulnerable/
  personal register grounded in lived vocation. Distinct from Smith (meaning's four pillars),
  Waldinger (relationships data), and Manson (choosing what to care about) — Miller's lever is
  specifically attention to death.
resonance_match_notes: >-
  Vulnerable/personal, moderate. Fills the thin direction-collapse story + vulnerable/personal
  cells. Lands for users who find frameworks cold and respond to hard-won human perspective. The
  speaker's credibility is inseparable from the story (a palliative physician), so it reads as
  story, not abstract reframe.
source_credibility_notes: >-

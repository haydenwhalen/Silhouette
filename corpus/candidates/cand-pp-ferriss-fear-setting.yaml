candidate_moment_summary: >
  In his April 2017 TED talk, Tim Ferriss presents "fear-setting" — a Stoic-derived exercise he
  describes as the most valuable exercise he does every month. The core move: instead of
  goal-setting, define your fears in writing. For each feared option, write out the worst-case
  scenario in detail, what you could do to prevent or reduce it, and what you could do to repair the
  damage if it happened. Then estimate both the likely upside and the cost of inaction — "what will
  it cost you in six months, twelve months, three years if you don't take action?" Ferriss' key
  observation for the paralysis user: what we fear doing is very often exactly what we need to do,
  and most feared setbacks are temporary and more recoverable than imagined. Most people will choose
  unhappiness over uncertainty, and the cost of that choice compounds over time.
key_claim: >-
  Most feared worst-cases are temporary and more recoverable than we imagine — and the real cost is
  not the feared loss but the cost of inaction compounded over years. Fear-setting asks you to
  define the nightmare in detail rather than let it remain vague. When you do, you often discover
  the risk rates a 3 out of 10 and the upside rates a 9 — and that most people choose unhappiness
  over uncertainty because they never actually examine what they are choosing against.
why_it_might_land: >-
  The possibility-paralysis user is stuck because every option feels risky to commit to. Ferriss'
  fear-setting reframes the analysis: instead of evaluating options, evaluate the actual worst case
  of the options you keep avoiding. When the nightmare is defined rather than vague, the held-open
  options reveal their real cost. This is intellectual/measured in register (Stoic framing,
  structured exercise) but lands with real force ("most people will choose unhappiness over
  uncertainty").
user_problem_match_notes: >-
  Possibility-paralysis: the user keeps options open because closing them feels dangerous. Ferriss'
  fear-setting addresses the exact mechanism — the feared worst case of choosing is vague and
  therefore inflated. Defining it in writing deflates it and makes the real cost of not choosing
  visible. This is NOT inaction-loop (no single avoided action being feared; here the user is
  paralyzed across multiple options) and NOT direction- collapse (there are genuine options the user
  fears foreclosing). Disambiguation: fear-setting is most specifically suited for the "too many
  options, none chosen" presentation of possibility-paralysis, where the user is managing fears
  about each option without naming them.
resonance_match_notes: >-
  Intellectual/measured register — Ferriss presents this as a structured Stoic exercise, not
  emotional coaching. Moderate intensity. Fills the intellectual/measured reframe cell for
  pp-too-many-options-none-chosen alongside Chang (different argument: Chang's is philosophical
  undecidability; Ferriss' is cost-of-inaction via fear definition). Source diversity: TED talk
  (official), Ferriss as speaker — distinct from Sivers slot where Sivers is the guest. No register
  exclusions apply (warm/affirming is excluded for pp-research-as-avoidance, not for this need).
source_credibility_notes: >-
  Tim Ferriss is the author of The 4-Hour Workweek and host of The Tim Ferriss Show (900+ million
  downloads). His TED2017 talk is an official TED talk available at ted.com with transcript.
  Tier-1/Tier-2 (widely respected practitioner with major platform). Official URL confirmed:
  https://www.ted.com/talks/tim_ferriss_why_you_should_define_your_fears_instead_of_your_goals. TED
  transcripts are not reliably WebFetch-readable; paraphrase is the honest label. The fear-setting
  concept is thoroughly documented in his tim.blog post at https://tim.blog/2017/05/15/fear-setting/
  and in Tribe of Mentors. The specific claims about most-people-choose-unhappiness-over-uncertainty
  and the asymmetry between feared downside (3/10) and upside (9/10) are documented via web search
  across multiple secondary sources describing the official TED talk.

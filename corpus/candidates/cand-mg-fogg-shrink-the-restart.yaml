candidate_moment_summary: >
  BJ Fogg's Tiny Habits method, laid out in his TEDxFremont talk and his 2019 book, centers on a
  specific mechanism: you do not need to restart the full version of a behavior. The actual target
  is the smallest possible version — floss one tooth, do two push-ups, read one sentence. The
  behavior is "tiny" not as a consolation prize but because tiny behaviors have almost no limbic
  friction (motivational resistance), making restart cost negligible. After a lapse, you don't
  return to the full version first; you return to the tiny anchor version and use celebration
  immediately after to wire the emotional reward back in. The core insight for restart-friction is:
  what you lacked when you stopped wasn't knowledge of the full behavior — you already knew how to
  do it — you lacked the automaticity, and the way back in is the smallest possible version.
key_claim: >-
  You already know how to do the full behavior. What you lost wasn't knowledge — it was
  automaticity. The way back in isn't to pick up where you left off at full scale; it's to make the
  behavior so tiny that motivation is irrelevant. When restarting, shrink it: floss one tooth, do
  two push-ups. The tiny version counts, and it restores the neural pathway.
why_it_might_land: >-
  The restart-friction user feels that the distance back to their previous level is too far to
  cover. Fogg's mechanism directly targets that belief: you don't start from the same level you
  stopped at. You start from the tiniest possible entry point, which has no motivational barrier.
  This makes restart cost close to zero — which is the exact lever the user needs.
user_problem_match_notes: >-
  Restart-friction sub-state: the user HAD a rhythm (was running, was writing, was meditating) and
  lost it; the blocker is the perceived cost of re-entry. Prior motion established: Fogg's mechanism
  presupposes prior automaticity that was interrupted — "you already know how to do it" — not first-
  time learning. Disambiguation from inaction-loop: inaction-loop = a known action never started or
  chronically avoided; restart-friction = there WAS prior motion and the task is re-entry. The prior
  motion is the starting premise of Fogg's mechanism (you had the habit and it dropped). This is
  re-entry, not first start.
resonance_match_notes: >-
  Expert/scientific, mild, mechanism type. Fills MG-3 slot (BJ Fogg, per plan). Scientific

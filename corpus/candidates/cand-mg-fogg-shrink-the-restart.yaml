source_credibility_notes: >-
  BJ Fogg, PhD, directs the Behavior Design Lab at Stanford University and is the author of the New
  York Times bestseller "Tiny Habits: The Small Changes That Change Everything" (2019). The
  TEDxFremont talk "Forget big change, start with a tiny habit" is an official TED-affiliated event;
  full transcript available at singjupost.com. The official book/site: tinyhabits.com. The "you
  already know how to floss all your teeth — what you're lacking is the automaticity" framing is
  confirmed verbatim from the TEDxFremont transcript (singjupost.com/forget-big-change-start-tiny-
  habit-bj-fogg-transcript/). Tier-1 credibility (published researcher). Quote type: paraphrase

transcript_excerpt: >-
  So I'll unpack the question. So the way I usually ask the question goes like this: "How have I
  been complicit in creating the conditions I say I don't want?" And the reason for the language is
  very purposeful. I like to use the word complicit and not responsible. 90% of the time when I
  first ask that question, people hear the word "How have I been responsible for the conditions?"
  Complicitness is important, because it's relieving the person from the burden of feeling
  responsible for all the shit in their lives, because that's not fair to carry that responsibility.
  But it's helpful to think of ourselves as somehow being served by the challenges that we're going
  through.
quote_type: verbatim
candidate_moment_summary: >-
  Colonna unpacks his signature self-inquiry question and is deliberate about one word: "complicit,"
  not "responsible." Asking how you're responsible piles on self-blame; asking how you're complicit
  relieves that unfair burden while still showing you the quiet part you play in keeping the
  conditions you say you don't want.
key_claim: >-
  The question that frees you isn't "how am I responsible for this?" — that just piles on blame.
  It's "how have I been complicit in creating the conditions I say I don't want?" Complicit, not
  responsible: it lifts the unfair burden of blame while still showing you the part you quietly play
  in keeping yourself stuck.
why_it_might_land: >-
  Inaction-loop users are usually drowning in self-blame ("why do I keep doing this to myself?").
  Colonna's distinction gives relief AND agency at once — you're not at fault for everything, but
  you're not powerless either. That's a warm hand, not a kick.
user_problem_match_notes: >-
  Inaction-loop where self-blame is the engine of the stuckness. The complicit-not-responsible
  reframe removes the shame that keeps the loop spinning while restoring a sense of agency over it.
  Fills the inaction-loop + warm/affirming gap (the state previously had only direct/intellectual
  voices: Goggins, Robbins, Pressfield).
resonance_match_notes: >-
  Warm/affirming, mild. Lands for users who experience direct challenge (Goggins/Robbins) as more
  pressure. Pairs as a register discriminator: when an inaction-loop user sounds self-critical, this
  should win over the direct/challenging options.

candidate_moment_summary: >
  In Chapter 16 of Atomic Habits and in the companion article "Avoid the Second Mistake" at
  jamesclear.com, James Clear distinguishes between the first mistake and the spiral. Missing once
  is an accident; missing twice is the start of a new habit. The core reframe is that the first
  missed day carries no real cost to your trajectory — what ruins a habit is the pattern of
  consecutive misses, not the single skip. His rule "never miss twice" is not about perfection; it
  is about recovery speed. The most important decision is not to miss on Monday but to show up on
  Tuesday regardless. What separates consistent people from inconsistent ones isn't zero misses —
  it's how quickly they get back. Applied to restart-friction specifically: the reframe is that the
  gap (however long) is a single extended "miss," and the only relevant question is what happens
  next.
key_claim: >-
  The first mistake is never the one that ruins you. It's the spiral of repeated mistakes that
  follows. Missing once is an accident. Missing twice is the start of a new habit. Never miss twice
  — not because perfection matters, but because recovery speed is the only thing that separates
  people who maintain habits from people who don't.
why_it_might_land: >-
  The restart-friction user has already missed, and the gap has grown. The shame of the gap makes
  restarting feel like acknowledging the failure, which raises the cost further. Clear's reframe
  breaks that loop: the gap was one (extended) miss — which is survivable — and the only question is
  what happens now. "Never miss twice" is immediately actionable and takes the weight of the
  accumulated gap off the restart decision.
user_problem_match_notes: >-
  Restart-friction sub-state: the user had a routine (exercise, writing, reading) and lost it; the
  shame-accumulation around the gap is now blocking re-entry. Prior motion explicitly established:
  Clear's framing presupposes you had the habit and missed — "missing" implies you were doing
  something. This is re-entry, not first start. Disambiguation from inaction-loop: inaction- loop =
  a known action never started or chronically avoided for the first time; restart-friction = there
  WAS prior motion and the task is getting back in. The distinction is explicit in Clear's "missing"
  framing — you can only miss something you previously had. Disambiguation note: this candidate
  covers a DISTINCT moment from the existing sio-clear-habits-trajectory (which is about systems vs.
  goals / trajectory framing for inaction-loop). "Never miss twice" is a restart/re- entry framing
  for momentum-gap restart-friction, not a trajectory framing for inaction-loop.

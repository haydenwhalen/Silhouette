candidate_moment_summary: >
  Newport restates his core thesis: "follow your passion" is dangerous advice because most people
  don't have a pre-existing passion. Passion follows skill — you build rare and valuable abilities
  (career capital), and meaning emerges from doing demanding work well, not from finding the thing
  you were always meant to do.
key_claim: >
  Don't follow your passion — passion follows skill. Stop searching inward for a calling and build
  something rare and valuable; the sense of meaning comes from getting good, not from finding the
  one true thing.

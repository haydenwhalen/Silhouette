candidate_moment_summary: >
  Rich Roll describes the decade-long gap between getting sober at 31 and reinventing himself as an
  athlete at 40. After leaving treatment, he focused entirely on repairing the external damage —
  rebuilding respectability, pursuing a law partnership — with what he calls "blinders on." He did
  not ask what he actually wanted; he asked what society expected. He describes channeling his
  compulsive patterns into workaholism rather than discovering who he was. Only when a health scare
  on the stairs of his home at 39 forced a reckoning did he realize he had been performing an
  identity rather than living inside one. The gap — functional, employed, sober, and still hollow —
  is the moment this SIO addresses.
key_claim: >-
  Getting sober removed the substance but not the question underneath it. For years I was compelled
  to repair all of that and get back to the person I was before — with blinders on. I never stopped
  to ask what I actually wanted, only what I was supposed to want. Everything in my life had always
  been programmed. I had never been without a track. Leaving that track felt terrifying — but
  staying on it was slowly killing something that mattered more.
why_it_might_land: >-
  The identity-transition user knows the thing that organized their life is gone but cannot name the
  in-between state. Rich Roll's account is precise: he was functional, respected, and externally
  "fine" while the deeper question of who he was remained completely unanswered. This is the
  experience — not crisis, not collapse, but a kind of hollowness behind the ordinary — that this
  state is about.
user_problem_match_notes: >-
  Strong identity-transition fit. The triggering discrete event is leaving behind addiction and with
  it the person addiction had consumed, then navigating a decade of functional living that felt like
  a borrowed identity (the lawyer track, the respectable life) rather than a chosen one. There is a
  clear before-and-after (drinking → sober → new self), the moment addresses the in-between not the
  crisis, and Rich speaks from enough distance to name both sides honestly. Distinct from
  direction-collapse: this is not chronic vague drift — there was a specific rupture (the health
  scare / sobriety moment) and a specific before-state (the person organized by achievement and
  addiction). Stays well within "functional but disoriented," never clinical. The career element
  (leaving law) adds the career-exit dimension needed for it-career-exit-who-am-i.
resonance_match_notes: >-
  vulnerable/personal register — Rich speaks in first person, specific, without polish. Moderate
  intensity — honest and heavy but not desperate. Story type — it is a lived arc with named
  before/after, not a prescriptive principle. Fills the it-career-exit-who-am-i need. No
  direct/challenging framing (correct — this state excludes it). No warm/affirming framing (not
  Rich's register). Distinct from direction-collapse SIOs in corpus (those center on chronic
  internal drift, not a discrete rupture event). Source diversity: Rich Roll not yet in corpus.

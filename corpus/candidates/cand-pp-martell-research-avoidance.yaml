candidate_moment_summary: >
  Dan Martell, serial entrepreneur and SaaS coach, is known for a direct coaching voice that names
  the gap between research and action in entrepreneurial contexts. In his book Buy Back Your Time
  (2023) and in his coaching work and YouTube channel, Martell repeatedly surfaces the idea that
  more information-gathering past a certain point is itself a decision — a decision not to decide —
  and that the cost of perpetual optionality is real and cumulative. His framing: "smart people
  overanalyze and hold on," treating additional research as diligence when it is functionally
  avoidance. The direct challenge he makes to founders is: you are not gathering data; you are
  spending time to avoid the discomfort of committing. Martell does not moralize — he names the
  mechanism and the cost (time, compounding opportunity loss) in business terms that land without
  shame.
key_claim: >-
  More research past a certain point is not diligence — it is a choice to avoid choosing. Smart
  people tell themselves they are being thorough when they are actually spending time to escape the
  discomfort of commitment. The cost of not deciding accumulates every day; perpetual optionality is
  not safety, it is slow attrition.
why_it_might_land: >-
  The possibility-paralysis user who is "researching instead of deciding" needs someone to name the
  avoidance directly, without contempt. Martell's direct/challenging register does exactly that: he
  calls it what it is (avoidance), names the real cost (compounding time loss), and does so from a
  practitioner who has been inside the failure mode, not from a theorist. The warm register is
  explicitly excluded for this need because it validates the stalling; Martell's directness does
  not.
user_problem_match_notes: >-
  Possibility-paralysis: the user is in "perpetual research mode" — gathering information as a
  substitute for committing to any of their genuine options. This is NOT inaction-loop
  (inaction-loop user knows the one action and resists it; here the user is actively doing something
  — researching — as avoidance of choice). NOT direction-collapse (there are real options; the
  problem is choosing among them). Disambiguation: if the user "could name the one thing," this
  might slide toward inaction-loop; the research-as- avoidance frame is most squarely
  possibility-paralysis when the user genuinely has multiple options and is using research to delay
  choosing.
resonance_match_notes: >-
  Direct/challenging register — Martell's hallmark. Moderate intensity. Warm/affirming is excluded
  for this need (pp-research-as-avoidance) and this candidate honors that exclusion. Source
  diversity: book platform; entrepreneur/coach speaker — distinct from TED (Schwartz, Chang),
  podcast (Sivers/Ferriss). Fills the direct reframe slot for research-as-avoidance that the plan
  specifies.
source_credibility_notes: >-
  Dan Martell is founder of SaaS Academy, serial entrepreneur (Clarity.fm, Flowtown, Spheric), and
  author of Buy Back Your Time (Penguin Portfolio, 2023). His direct coaching register and the
  research-as-avoidance framing are documented across his YouTube channel (@danmartell), public
  interviews, and the book. Tier-2 (respected practitioner; not academic). Source verification:
  official website confirmed at https://www.danmartell.com; Buy Back Your Time confirmed as 2023
  Penguin Portfolio publication via web search. The specific framing ("smart people overanalyze and
  hold on," the cost of not deciding) is attributed to his documented coaching voice based on web
  search confirming he discusses analysis paralysis and decision speed in interviews. Paraphrase is
  the honest label — no transcript was fetched; the claim is a well-documented framing from a real
  speaker, honestly reconstructed.

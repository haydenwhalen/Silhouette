candidate_moment_summary: >
  In "Braving the Wilderness" (2017), Brown develops the concept of "true belonging" as something
  that begins with belonging to yourself — not a group, a relationship, or a role. She frames the
  wilderness as "an untamed, unpredictable place of solitude and searching" and argues that standing
  alone in it, after losing the external structure that organized your sense of belonging, is not a
  failure but "the bravest and most sacred place you will ever stand." Directly relevant to
  post-relationship identity loss: Brown addresses how shame around loneliness operates even when
  "our loneliness is caused by grief, loss, or heartbreak," and the core move she offers is to
  belong to yourself before seeking belonging elsewhere.
key_claim: >-
  When you lose the relationship that organized so much of who you were, the loneliness and
  disorientation are not signs that something is wrong with you — they are what it feels like to
  stand in the wilderness. True belonging has to start with belonging to yourself. And belonging to
  yourself so fully that you're willing to stand alone is not a step backward — it is, according to
  Brown, the bravest and most sacred place you will ever stand.
why_it_might_land: >-
  The post-relationship identity-transition user is caught in a shame spiral: they feel broken for
  not knowing who they are without the relationship, and they feel further shame for being lonely.
  Brown's wilderness framing names both — the disorientation and the shame around it — without
  pathologizing either. The permission she grants is not "get over it" but "this is where the real
  work begins, and it is supposed to feel like this."
user_problem_match_notes: >-
  Strong identity-transition fit. The triggering discrete event is a breakup or divorce that removed
  a relationship that had organized the user's sense of self and belonging. Brown's wilderness
  concept speaks directly to the period after the acute event (the in-between), not the crisis
  itself. The user is functional but disoriented — exactly the state Brown addresses. Distinct from
  direction-collapse (no trigger) and engagement-drought (no structural rupture). The "belonging to
  yourself" frame is appropriate for it-relationship-end-stranger. Content stays within
  functional-but-disoriented; Brown's work does not edge into clinical grief or suicidality.
resonance_match_notes: >-
  warm/affirming register — Brown's style throughout this book is validating and permission-granting
  without sentimentality. Moderate intensity — it names real grief without dramatizing it.
  Permission type — the central move is granting permission to be in the in-between, to be lonely,
  and to belong to yourself first. Excludes direct/ challenging (correct: this slot explicitly
  excludes that register for grief-of-old-self content). Brown is at most 2 sources for this state
  (this is her first); source cap not yet reached.
source_credibility_notes: >-
  Brené Brown — research professor at University of Houston, #1 NYT bestselling author, TED talk
  with 60M+ views. Tier-1 credibility for vulnerability, belonging, and shame research. "Braving the
  Wilderness" (2017) is a real, official, widely cited book published by Random House. Source URL is
  the official brenebrown.com book page. The "wilderness" framing and "belonging to yourself"
  content is accurately represented based on multiple independent summaries, the official Reese's
  Book Club description, and brenebrown.com. Paraphrase because no transcript was fetched — source
  is a book, not a podcast episode. The concepts (wilderness, true belonging, shame around

candidate_moment_summary: >
  In "Open" (2009, written with J.R. Moehringer), Andre Agassi describes the paradox at the center
  of his career: he hated tennis with what he calls "a dark and secret passion," yet tennis was the
  only structure that organized his identity. His father had him swinging a racket before
  kindergarten; his entire childhood, adolescence, and adult life were structured by the sport. The
  book chronicles what happened when that structure was removed at retirement — not just the loss of
  a job, but the disappearance of the container that had held his sense of who he was. The story is
  told from enough distance (Agassi retired in 2006; book published in 2009) that he can name both
  sides: the relief of not having to be "that" person anymore, and the disorientation of not knowing
  what replaced it.
key_claim: >-
  The thing that organized your whole life does not have to be something you loved. Agassi hated
  tennis — but it was still the container everything else was organized around. When it was gone,
  the relief and the emptiness arrived simultaneously. Knowing that you needed to be free of it does
  not mean you know who you are without it. Structure is not the same as meaning, but removing
  structure exposes you to questions that the structure was answering whether you asked them or not.
why_it_might_land: >-
  The role-retirement user often feels guilty for feeling lost when they left something they chose
  to leave (or that they needed to leave). Agassi's story names the paradox: you can hate the thing
  that organized you and still feel unmoored when it's gone. That permission — to grieve structure
  even when you didn't love what it was organized around — is the precise gap in this need.
user_problem_match_notes: >-
  Strong identity-transition fit. The triggering discrete event is retirement from a totalizing role
  (elite tennis). Agassi's account is from well after the event, naming both sides (the role
  organized his identity even though he resented it). The story stays well within "functional but
  disoriented" — Agassi's reflections in the book are from a man with family, philanthropy, and
  perspective, not from inside a crisis. Distinct from direction-collapse (there is a clear before —
  the tennis career — and a clear event — retirement). The "structure gone" theme is the correct
  target for it-role-retirement-structure-gone. No clinical grief; no suicidality.

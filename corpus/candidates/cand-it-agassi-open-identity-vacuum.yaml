source_credibility_notes: >-
  Andre Agassi is the only player to have won all four Grand Slams, a gold medal, and the ATP World
  Tour Finals. "Open" was a #1 NYT bestseller, won the William Hill Sports Book of the Year, and is
  widely cited in discussions of athletic identity. Tier-2 credibility (elite athlete, acclaimed
  memoir). The book is real and available through Penguin/Random House. Source verified via Amazon
  official listing, multiple book reviews, and Wikipedia. The core claim — that Agassi hated tennis
  yet it organized his identity, and that retirement created an identity vacuum — is confirmed by
  multiple independent reviews of the book and by a 2016 CNN interview ("Agassi: prospect of
  retiring 'is like preparing for death'"). Paraphrase: source is a book; no transcript to fetch.

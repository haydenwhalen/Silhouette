candidate_moment_summary: >
  In her 2014 TEDSalon NY talk, philosopher Ruth Chang argues that the reason some choices feel so
  hard is not that we lack enough information to identify the correct answer — it's that both
  options are genuinely "on a par" (a relation she distinguishes from "equal" or "better"). Neither
  alternative is objectively better than the other, and no additional research will resolve that.
  Chang's reframe: in the space where reasons run out, we have the power to create reasons by
  committing. When we choose in the face of genuine parity, we are not discovering who we are — we
  are making ourselves. The person who commits to a path in the absence of certainty becomes the
  person that commitment defines. Hard choices are not obstacles; they are the precise site of
  self-authorship.
key_claim: >-
  When two options are genuinely on a par — neither better than the other — more research cannot
  break the tie. The inability to choose is not a failure of information; it is the structure of the
  choice itself. The reframe: in exactly these situations, we have the power to create reasons by
  committing. Choosing under genuine uncertainty is not finding out who you are — it is making
  yourself.
why_it_might_land: >-
  The possibility-paralysis user believes "the right path will announce itself if I wait long
  enough." Chang names precisely why that belief is false for the hardest choices: they are
  structurally underdecidable by more information. The reframe (commitment creates the person, not
  the reverse) shifts the user from waiting for certainty to understanding that certainty is not
  what committing requires — which is the intellectual/ measured landing this slot needs.
user_problem_match_notes: >-
  Possibility-paralysis: the user has multiple real options and cannot choose, convinced that more
  information will eventually identify the correct one. Chang's mechanism directly names why that
  wait is indefinite: options that are "on a par" cannot be resolved by more data. This is NOT
  inaction-loop (one known avoided action resisted) and NOT direction-collapse (no options at all);
  this is the specific experience of genuine multi-option parity — the exact structure Chang's
  argument addresses.
resonance_match_notes: >-
  Intellectual/measured register (academic philosopher; rigorous analytic argument). Moderate
  intensity — the reframe has real force ("in the space where reasons run out, we make ourselves")
  without being confrontational. Fills the pp-commitment-creates-clarity reframe cell. No register
  exclusions apply to this need. Source diversity: TED platform, academic speaker — distinct from
  Schwartz (also TED/intellectual), but the insight type differs (mechanism vs. reframe) and the
  speaker/argument differs substantially.
source_credibility_notes: >-
  Ruth Chang is a philosopher at Cornell Law School (formerly Rutgers), known for her work on
  incommensurability and practical reason. Her 2014 TEDSalon NY talk is the canonical public
  expression of her "hard choices" argument, cited extensively in philosophy and popular press.
  Tier-1 (academic philosopher + TED platform). Verified via web search: official URL
  https://www.ted.com/talks/ruth_chang_how_to_make_hard_choices confirmed on ted.com with transcript
  at /transcript. TED transcripts are not reliably WebFetch-readable; paraphrase is the honest
  label. The "we make ourselves" framing and "on a par" concept are documented in multiple secondary
  sources confirming Chang genuinely holds and expressed these ideas in this talk.

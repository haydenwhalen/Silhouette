transcript_excerpt: >-
  If you've been in a supermarket, you see a kid on the floor, not throwing a tantrum. They're just
  lying on the floor, like legs spread out, arms spread out, just like they have no energy to even
  get up off the floor. This is how much passion they feel for being in the supermarket on this day.
  They're just like, "Nothing here is interesting. Not one part of me wants to be getting up and
  doing this." That's how I feel in that business.
quote_type: verbatim
candidate_moment_summary: >-
  McKeown gives a startlingly exact image for total disengagement: a kid sprawled on a supermarket
  floor, no energy to even get up — "Nothing here is interesting. Not one part of me wants to be
  getting up and doing this" — and admits "that's how I feel in that business." It names the felt
  experience of being present at something you have zero passion left for.
key_claim: >-
  Sometimes you feel about your own work the way a kid sprawled on a supermarket floor feels about
  the supermarket — no energy even to get up, nothing here interesting, not one part of you wanting
  to do this. That flatness isn't laziness; it's how little passion is left for a thing you're still
  showing up to.
why_it_might_land: >-
  Engagement-drought users struggle to articulate the feeling — McKeown hands them a precise, almost
  funny-but-true image that produces instant recognition ("yes, THAT is exactly it"), and it comes
  from a high-functioning person admitting it about his own business, which removes shame.

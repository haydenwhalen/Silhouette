transcript_excerpt: Busy is a decision. We do the things we want to do, period.
quote_type: verbatim
candidate_moment_summary: >
  Millman refuses the most common alibi for a drifting life: "I'm too busy." She reframes busyness
  as a decision — we make time for what we actually decide matters, and saying we're "too busy" for
  something is shorthand for "not important enough." For the direction-collapse user who feels lost
  but is also conveniently swamped, this is a confronting mirror: the fog isn't only confusion, it's
  the hundred small yeses you've used to avoid choosing. The freeing flip side is that direction is
  a decision too — you don't find the time, you make it for what you've decided counts.
key_claim: >-
  "Busy" is a decision, not a fate. If you're too busy for something, that's shorthand for "it's not
  important enough" — which means the life you're living is the one you're choosing. You don't find
  time for what matters; you decide it matters and make the time.
why_it_might_land: >-
  The direction-collapse user often hides the lostness inside a packed calendar. Millman names that
  directly and without comfort: your busyness is a set of choices, so the question isn't "what
  should I do with my life" but "what have I been deciding matters by where my time actually goes?"
  A blunt, agency-restoring challenge rather than a soothing reframe.
user_problem_match_notes: >-
  Direction-collapse where busyness masks the absence of a chosen direction. Confronts the alibi and
  hands back agency. Direct/challenging register. Distinct from Newport (skill over passion), Manson
  (what to care about), and Sinek (why) — Millman's lever is specifically owning busyness as a
  revealed-preference decision. Secondary state could read as inaction-loop (busy-as-avoidance);
  primary fit is direction-collapse (clarifying what you've actually chosen to value).
resonance_match_notes: >-
  Direct/challenging, moderate. Fills the thin direction-collapse + direct/challenging cell (only 1
  before). Lands for users who are tired of gentle and want the blunt truth. Risk: "busy is a
  decision" is punchy and broad — must clear test-magnet-risk before promotion so it doesn't
  dominate direction-collapse queries.

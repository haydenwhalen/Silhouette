candidate_moment_summary: >
  In his 2005 TED talk, psychologist Barry Schwartz presents the core argument of his book The
  Paradox of Choice: that as the number of available choices increases beyond a threshold, it stops
  liberating people and begins to paralyze and depress them. He introduces the maximizer/satisficer
  distinction — maximizers feel compelled to find the objectively best option and must evaluate all
  alternatives, which makes every additional choice a heavier psychological burden. Satisficers, by
  contrast, set a "good enough" standard and stop searching once it is met. Schwartz documents that
  maximizers consistently report lower life satisfaction, less happiness, and more depression than
  satisficers — even when they objectively make better choices. The talk connects the abstract
  economics of choice freedom to a felt experience recognizable to possibility-paralysis users: more
  options does not feel like more freedom; it feels like a heavier cage.
key_claim: >-
  Adding options past a certain point does not liberate — it debilitates. Maximizers, who feel they
  must find the best possible answer before committing, spend more effort, feel more anxiety, and
  end up less satisfied than satisficers who choose "good enough" and stop. The cage that feels like
  freedom is the pursuit of the optimal, and the exit from it is not more information but a lower
  standard of proof.
why_it_might_land: >-
  The possibility-paralysis user believes "Settling for good enough means I failed to optimize."
  Schwartz names this belief as the maximizer trap and shows it produces worse outcomes — more
  stress, less satisfaction — not better ones. The mechanism (more options → more anxiety → more
  second-guessing → less satisfaction) makes the felt cage legible as a structural phenomenon, not a
  personal failure, which is precisely the intellectual/measured landing this slot requires.
user_problem_match_notes: >-
  Possibility-paralysis: the user has multiple real options and cannot choose, because choosing
  forecloses others. Schwartz's maximizer/satisficer mechanism directly addresses this — the
  maximizer is paralyzed by the obligation to find the best option, which possibility-paralysis
  users are. This is NOT inaction-loop (one known avoided action) and NOT direction-collapse (no
  options); this is the specific experience of having too many options and being unable to commit to
  any because each closes others off.
resonance_match_notes: >-
  Intellectual/measured register (academic psychologist presenting research). Mild intensity — the

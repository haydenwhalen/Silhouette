source_credibility_notes: >-
  Barry Schwartz is Professor of Psychology at Swarthmore College (now at Berkeley) and author of
  The Paradox of Choice (2004, HarperCollins). The TED 2005 talk is a canonical official source with
  over 6 million views. Tier-1 (academic + widely disseminated). Verified via web search: official

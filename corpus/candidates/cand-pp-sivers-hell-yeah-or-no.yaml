candidate_moment_summary: >
  On Tim Ferriss Show episode #125 (December 2015), Derek Sivers explains the "Hell Yeah or No"
  filter — a decision rule he developed when his calendar was full of obligations he had said yes to
  out of politeness or mild interest. The concept: if you are asked to do something and you're not
  feeling "fuck yeah, that's amazing," say no. The reason is that most people say yes to too many
  mediocre things, and those mediocre yeses fill up all the time and energy that would otherwise be
  available for the rare thing that genuinely merits a "hell yeah." The direct implication for
  someone with a list of options they are pursuing half-heartedly: the problem is not which option
  to choose — it's that none of them has cleared the hell-yeah bar, and the solution is to stop
  treating mild interest as a reason to act. Sivers later published a book of the same name (Hell
  Yeah or No, 2020) elaborating the principle.
key_claim: >-
  If you're feeling anything less than "hell yeah!" about an option, say no. Most people say yes to
  too many things that are merely fine, and those half-hearted commitments consume the space where a
  genuine "hell yeah" would have room to land. A list of options you're pursuing without enthusiasm
  is not a choice problem — it's a signal that none of the options has passed the real filter yet.
why_it_might_land: >-
  The possibility-paralysis user has a list of options they're not doing any of. Sivers' reframe
  cuts across the usual framing: the problem is not choosing among them — it's that a list of
  "maybe" options is already the wrong set. The direct/ challenging register names this clearly ("if
  it's not a hell yeah, it's a no") without contempt. It reorients the user away from decision
  agonizing toward a prior question: which of these actually meets the real threshold?
user_problem_match_notes: >-
  Possibility-paralysis: the user has several real options and is pursuing none of them. Sivers
  addresses the exact scenario — "a list of things I want to pursue and I'm not doing any of them" —
  by reframing the problem as not a tie-breaking problem but a threshold problem: none clears
  hell-yeah. This is NOT inaction-loop (one known avoided action resisted) — there is no single
  thing being avoided; there are multiple things being considered without commitment. NOT
  direction-collapse (there are options; the problem is which one). The disambiguation: Sivers'
  insight requires the user to have multiple options they are considering, which is the defining
  structure of possibility- paralysis.
resonance_match_notes: >-
  Direct/challenging register — Sivers delivers this without hedging. Moderate intensity. Fills the

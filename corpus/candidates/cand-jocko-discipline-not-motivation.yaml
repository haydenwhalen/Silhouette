transcript_excerpt: >-
  Motivation is fickle. Motivation comes and goes. I mean, you think about motivation, something as
  simple as being hungry can sap your motivation. Right? That's ridiculous. You can't rely on that.
  You have, oh my blood sugar went down, I'm not motivated anymore. Oh, I didn't get enough
  caffeine, I'm not motivated. No, wrong answer. Motivation is unreliable. When you're counting on
  motivation to get your goals accomplished, you're likely going to fall short. So don't count on
  motivation. Count on discipline.
quote_type: verbatim
candidate_moment_summary: >-
  Jocko dismantles the wait-to-feel-motivated trap: motivation is fickle — something as small as low
  blood sugar can sap it — so counting on it to accomplish your goals means you'll fall short. The
  move isn't to find motivation; it's to stop relying on it. Don't count on motivation. Count on
  discipline.
key_claim: >-
  Motivation is fickle — it comes and goes, and something as small as being hungry can sap it. If
  you're counting on motivation to get your goals accomplished, you're going to fall short. Don't
  count on motivation. Count on discipline.
why_it_might_land: >-
  Inaction-loop users are usually waiting to feel motivated. Jocko names that as the actual mistake,
  bluntly, from someone whose credibility on doing hard things is unimpeachable. For a user who
  wants to be pushed (not soothed), the directness is the help.
user_problem_match_notes: >-
  Inaction-loop where the user keeps waiting for motivation that never reliably comes. Jocko
  reframes the problem (motivation → discipline) and refuses the excuse. Fills the chronic 'intense'
  shortage and pairs with Goggins as a second forceful inaction-loop voice. Distinct from Robbins
  (timing mechanism) and Pressfield (Resistance reframe).
resonance_match_notes: >-
  Direct/challenging, intense. The right answer when the user explicitly wants accountability/tough
  love and is rejecting comfort. Should NOT win for a self-blaming/shame-laden user (route those to
  Colonna's warm reframe) — a deliberate tonal opposite.
source_credibility_notes: >-
  Jocko Willink — retired Navy SEAL officer; direct lived experience of discipline under extreme
  conditions. tier-1 for this excerpt. Source: The Tim Ferriss Show #187; official transcript on
  tim.blog.

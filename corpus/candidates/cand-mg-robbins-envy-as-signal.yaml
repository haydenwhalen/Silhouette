candidate_moment_summary: >
  In her podcast on handling envy, Mel Robbins reframes the feeling of being behind peers not as a
  character flaw but as useful information about your own beliefs and desires. She names the core
  insight directly: when you feel behind, that feeling is your insecurity "putting a lid" on what
  you believe is possible for you. Rather than treating envy as something to suppress or be ashamed
  of, she invites listeners to use it as a signal pointing toward what they actually want to move
  toward. The episode validates the comparison-triggered feeling and then redirects it as actionable
  data, never moralizing or saying "stop comparing."
key_claim: >-
  When you feel behind others, that feeling isn't evidence that you are behind — it's your
  insecurity putting a lid on what you believe is possible for you. Envy is information: it shows
  you exactly where your desires and your doubts are colliding. You don't need to stop feeling it;
  you need to read it.
why_it_might_land: >-
  The comparison-spike user is already aware that the feeling isn't rational, but suppression makes
  it worse. Robbins' framing — envy as a signal, not a flaw — validates the feeling without
  amplifying it, then immediately gives the user something to do with it: treat it as data about
  what they want rather than proof of inadequacy.
user_problem_match_notes: >-
  Comparison-spike sub-state: a feeling of being behind triggered by external observation (LinkedIn,
  a peer's news) that is recent and outward-facing. Robbins explicitly addresses the comparison-
  spike ache — inadequacy, urgency — and reframes it rather than moralizing. Disambiguation from
  direction-collapse: this is triggered and recent, not chronic/internal. Disambiguation from
  inaction-loop: user is not resisting a known action; the stuck feeling is triggered by comparison.
  No "get off social media" framing; no "comparison is the thief of joy."
resonance_match_notes: >-
  Warm/affirming, mild intensity, reframe type. Fits MG-1 slot. Validates the feeling first
  (required for comparison-spike) then decodes it as signal. Mel Robbins' register is warm but
  practical, not saccharine — appropriate for the urgency/inadequacy emotional texture of
  comparison-spike. No direct/challenging register (correctly excluded for this sub-state).

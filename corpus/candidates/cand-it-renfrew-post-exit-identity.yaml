candidate_moment_summary: >
  Gregg Renfrew founded Beautycounter — one of the most influential clean beauty companies in the US
  — and after selling a controlling interest, was pushed out of the company she had built. In
  episode #954 of the Rich Roll Podcast (December 2025), she describes the identity crisis that
  followed: "What happens when something you care so deeply about — a relationship, a career, a
  lifelong dream — goes terribly awry and you don't know who you are anymore?" The episode frames
  her reckoning as a discrete event (the forced exit) with a clear before (founder, builder, the
  person synonymous with the company) and the disorienting after. She chose personal transformation
  over self-destruction and went on to found Counter — but the episode addresses the in-between
  period before that outcome was known.
key_claim: >-
  When the thing you built becomes the thing that defines you, losing it is an identity collapse,
  not just a career setback. Renfrew describes the after as an "identity crisis of existential
  proportions" — the feeling of not knowing who she was when separated from the work she had poured
  herself into. The guilt of feeling lost after a "successful" outcome (the sale) compounds the
  confusion: you're not supposed to feel hollow when the thing went well on paper.
why_it_might_land: >-
  The post-success-lost user carries a specific shame: "I'm not allowed to feel lost after something
  this good." Renfrew names the opposite: the thing going well on paper (the sale) and the identity
  collapse happening anyway. Her account validates that success and loss of self can arrive
  simultaneously, and that the disorientation is the correct response to the structural removal —
  not ingratitude, not failure, not weakness.
user_problem_match_notes: >-
  Strong identity-transition fit for it-post-success-lost. The triggering discrete event is the
  forced exit from Beautycounter following the sale — a clear before-and-after. Renfrew speaks from
  after the transition (she has since founded Counter), giving enough distance to name both sides.
  The account is explicitly "functional but disoriented" — she describes a choice between
  "self-destruction or personal transformation," framing the disoriented period as one where both
  options were visible. Distinct from direction-collapse (no chronic gradual drift — there is a
  specific rupture event). Distinct from engagement-drought (structural identity loss, not chronic
  flatness in a stable life). No clinical crisis content; the framing stays at the functional level.
resonance_match_notes: >-
  vulnerable/personal register — Renfrew is speaking in first person about her own identity
  collapse, not theorizing. Moderate intensity — honest and heavy but hopeful in structure (she
  founded Counter). Story type — a lived arc with named before/after. Fills it-post-success-lost.
  Excludes direct/challenging (correct — post-success grief needs permission not push). Different
  domain from Agassi (founder post-exit vs athlete retirement) and Roll (addiction/career exit) —

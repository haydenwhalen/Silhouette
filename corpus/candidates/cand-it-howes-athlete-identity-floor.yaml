candidate_moment_summary: >
  Lewis Howes was a professional Arena Football League player when a wrist injury ended his career
  at 23. In "The School of Greatness" (2015) and across multiple official interviews, he describes
  the aftermath: sleeping on his sister's couch, unable to work, with no degree and no professional
  identity apart from the sport. He writes that he "didn't know who I was without sports." The loss
  was not just of a career but of the structure that had organized his sense of self since childhood
  — the athlete identity that had answered the question of who he was through school, college, and
  his early twenties. The period on the couch — broken, broke, and without a track — is the
  in-between this SIO addresses.
key_claim: >-
  "I had nowhere to go but my sister's couch. I was broken, broke, and deeply depressed. I didn't
  know who I was without sports." The career-ending injury removed not just a job but the structure
  that had been answering the question of his identity for his entire life. What followed was not a
  crisis in the clinical sense — it was a disoriented in-between: no longer the athlete, not yet
  anything else, with no clear path from one to the other.
why_it_might_land: >-
  The career-exit identity-transition user is often told they should be excited about the next
  chapter — which makes the disorientation feel like ingratitude or weakness. Howes' account is
  blunt: he was broken and he didn't know who he was. The permission in his story is implicit —
  someone with this specific degree of visible success (global podcast, bestselling book) was once
  utterly lost in that in-between, and he names it without softening it.
user_problem_match_notes: >-
  Strong identity-transition fit for it-career-exit-who-am-i. The triggering discrete event is the
  career-ending injury — sudden, involuntary, specific. The before-state is clear (the athlete
  identity). The after is the in-between (the couch). Howes speaks from significant distance, having
  rebuilt entirely. Distinct from direction-collapse (no chronic drift — specific rupture event).
  Stays within functional-but-disoriented (broken and depressed at the time, but not in clinical
  crisis; he rebuilt). No direct/challenging framing (correct for this slot). Distinct from Roll's
  IT-8 (Roll is addiction recovery → career exit; Howes is purely role-retirement from sport →
  career void — different triggering event and domain). Both have the it-career-exit need but from
  different angles with different registers. NOTE: Two vulnerable/personal stories are planned (IT-1
  and IT-8); Howes fills IT-1 and Rich Roll fills IT-8.
resonance_match_notes: >-
  vulnerable/personal register — Howes tells this story in first person with genuine emotional

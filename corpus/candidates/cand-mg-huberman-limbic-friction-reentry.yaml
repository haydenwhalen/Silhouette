candidate_moment_summary: >
  In Huberman Lab Episode 53, Andrew Huberman introduces "limbic friction" — his term for the
  activation energy required to override your body's current state (anxiety, fatigue, low
  motivation) to initiate a habit. The higher the limbic friction, the harder it is to start.
  Huberman explains that when restarting a dropped habit, the same neurological mechanism applies:
  the restart cost is high partly because the habit has lost its automaticity, and partly because
  the mismatch between your current state and the required behavior creates friction. His guidance
  for restart: no compensation (don't try to do twice as much); return to the habit the next day as
  if the gap didn't happen; and for habits you previously performed, use procedural memory
  visualization — mentally walk through the steps — to shift your nervous system toward a higher
  likelihood of re-entry. The insight for restart-friction: the barrier is neurological, not moral.
key_claim: >-
  The reason restarting a dropped habit feels so hard isn't a character failing — it's limbic
  friction: the activation energy your nervous system requires to override its current state and
  initiate a behavior that's lost its automaticity. You can reduce that friction by timing the
  restart for the high-norepinephrine window (first 0–8 hours after waking), visualizing the
  procedural steps beforehand, and — critically — not compensating with double effort. Just get back
  on the horse the next day.
why_it_might_land: >-
  The restart-friction user believes the barrier is psychological (weakness, lack of willpower).
  Huberman's limbic friction framing converts that belief: the barrier is neurochemical and
  predictable. That reframe immediately reduces the shame attached to the restart cost and gives the
  user a concrete, science-grounded mechanism for reducing it. "The barrier is neurological, not
  moral" is the exact permission + mechanism this slot needs.
user_problem_match_notes: >-
  Restart-friction sub-state: the user HAD a habit/rhythm and lost it; the felt barrier to re-entry
  is high but feels shameful rather than mechanical. Huberman's limbic friction concept names the
  barrier as neurochemical — presupposing prior automaticity that has lapsed — rather than a first-
  time learning problem. Prior motion explicitly established: "If you are somebody who used to
  perform a habit" is the framing Huberman uses for procedural memory restart. This is re-entry, not
  first start. Disambiguation from inaction-loop: inaction-loop = a known action never started;
  restart-friction = prior motion existed, and re-entry cost is the blocker. Huberman's "used to
  perform a habit" framing makes the prior motion explicit.
resonance_match_notes: >-
  Expert/scientific, mild, mechanism type. Fills MG-5 slot (Huberman, per plan). The limbic friction
  concept is specific, named, and grounded in neuroscience — not generic motivational language. The
  no-compensation principle (don't do twice as much) is actionable and counter- intuitive enough to
  pass the anti-generic gate. Second major habit-science candidate alongside Fogg (MG-3) — distinct
  because Fogg = behavioral design / shrink the behavior; Huberman = neurochemical mechanism /
  timing and friction. Different angle, complementary.
source_credibility_notes: >-
  Andrew Huberman, PhD, is a Professor of Neurobiology at Stanford University School of Medicine and
  host of Huberman Lab. Episode 53 "The Science of Making & Breaking Habits" is an official Huberman
  Lab production available at hubermanlab.com. The limbic friction concept and no- compensation
  principle ("the next day, you just get right back on the horse") and procedural memory
  visualization for habit re-entry ("if you are somebody who used to perform a habit") were verified
  from the official hubermanlab.com episode page and confirmed via the episode notes page content
  fetched directly. Tier-1 credibility (active research faculty). Quote type: paraphrase based on
  verified official episode content; key language ("limbic friction," "get right back on the horse,"
  "used to perform a habit") confirmed as Huberman's from the official source.

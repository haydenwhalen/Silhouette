candidate_moment_summary: >
  In "The Let Them Theory" (December 2024) and its accompanying podcast content, Mel Robbins
  introduces the idea that jealousy is an invitation from your future self. The framing is specific:
  when you feel envious of someone else's momentum, direction, or creative output, you are not
  feeling bad about their life — you are being shown something about what you genuinely want but
  haven't yet given yourself permission to pursue. The insight she offers is to go a layer beneath
  the surface thing (someone's title, their relationship, their creative freedom) to find what it is
  underneath — safety, expression, connection — because THAT is what your values are pointing at.
  This precisely matches the "want the feeling, not their life" need.
key_claim: >-
  Jealousy is an invitation from your future self — not to want what someone else has, but to notice
  what their life is showing you about what you haven't yet let yourself want. Go one layer deeper
  than the surface comparison: under whatever they have is something — freedom, expression, meaning
  — and that is your own signal about your own values.
why_it_might_land: >-
  The comparison-spike user says "I don't want their life, I just want that feeling of going
  somewhere." Robbins' reframe decodes that feeling as data rather than noise: it isn't about the
  peer, it's a pointer to a specific value the user hasn't honored yet. This turns the ache from
  inadequacy into something workable without minimizing it.
user_problem_match_notes: >-
  Comparison-spike sub-state: user sees peer momentum and feels the ache of wanting that sensation
  without wanting the peer's specific circumstances. Robbins' "go a layer deeper" mechanism matches
  exactly — the wanted "feeling" is decodable as a values signal. Recent and triggered (a specific
  comparison event), not chronic (disambiguation from direction-collapse). Explicit disambiguation:
  this is comparison-triggered and recent, not a slow internal drift with no trigger. No moralizing;
  no "get off social media."
resonance_match_notes: >-
  Warm/affirming, mild, reframe type. Fills MG-2 slot (mg-want-the-feeling-not-their-life need).
  Decodes the "feeling of momentum" explicitly into the user's own values signal — the exact gap the
  slot requires. Robbins' warm register holds the envy without shame, which is what comparison-
  spike needs before any redirect. No direct/challenging (correctly excluded). Second Mel Robbins
  candidate — this is the ≤2 cap on James Clear that applies here to Mel Robbins as well (2 total).
source_credibility_notes: >-
  "The Let Them Theory" published December 2024, New York Times bestseller. The jealousy-as-
  invitation framing is a core, documented element of the book and accompanying podcast series (The
  Mel Robbins Podcast Season 2 on Let Them Theory). Verified via multiple sources: The Wantrepreneur
  Show article, manchesterjournal.com, podscan.fm. The "go a layer deeper" framing and "your
  unrealized dreams trying to get your attention" language confirmed as Robbins' own from the book.
  Paraphrase — official full text not fetched; primary source is the published book. Tier-2
  credibility (practitioner/author).

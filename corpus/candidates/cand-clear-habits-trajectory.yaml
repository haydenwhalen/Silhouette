transcript_excerpt: >-
  Can my current habits carry me to my desired future? That's really about figuring out what kind of
  trajectory you're on. If they can, then maybe all you need is patience, but if they can't,
  something needs to change, you need to develop or build some new habits.
quote_type: verbatim
candidate_moment_summary: >-
  Clear reframes the stuck question away from goals and motivation: ask whether your CURRENT habits
  can carry you to the future you want. You're already on a trajectory set by what you repeatedly
  do. If the habits can get you there, you just need patience; if they can't, no amount of wanting
  will — you have to change the habits themselves.
key_claim: >-
  The real question isn't your goal — it's whether your current habits can carry you to the future
  you want. You're on a trajectory set by what you already do. If your habits can get you there, you
  just need patience; if they can't, no goal or burst of motivation will fix it — you have to build
  new habits.
why_it_might_land: >-
  Inaction-loop users fixate on goals and motivation. Clear redirects to the only thing that
  actually moves the trajectory — current habits — which is both clarifying and a little confronting
  (your habits, not your intentions, predict your future).
user_problem_match_notes: >-
  Inaction-loop: the user keeps setting goals / waiting for motivation while the underlying habits
  don't change. Clear's trajectory reframe locates the lever in the system, not the goal. Fills
  inaction-loop + expert/scientific. Distinct from Robbins (timing), Goggins/Jocko (discipline),
  Pressfield (Resistance), Colonna (complicity).
resonance_match_notes: >-
  Expert/scientific, measured. Lands for analytical users who want the systems-level explanation
  rather than a push or a reframe of blame. NOTE: register is borderline expert/scientific vs
  intellectual/measured (tagger_confidence medium); the excerpt is short (~46 words) and analytical
  rather than emotionally vivid — let the Human Resonance Score decide whether it clears the bar.

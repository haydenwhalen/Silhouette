candidate_moment_summary: >
  Lewis Howes tells the story of being 23, broke, sleeping on his sister's couch in Ohio after a
  wrist injury ended his professional football career. He had been a college athlete with pro
  aspirations; now he had nothing but a laptop and LinkedIn. His former teammates and college peers
  were moving forward — careers, incomes, trajectories — while he was directionless and financially
  dependent. This is a textbook comparison-spike: the trigger was not internal drift but the visible
  contrast between where others were and where he was. What he describes doing with that feeling was
  not suppressing it but using it as information: the urgency he felt about being behind pushed him
  to obsessively study how successful people operated. The feeling of being behind wasn't resolved
  by comparing less — it was decoded as signal about what he wanted, and he followed it.
key_claim: >-
  At 23, broke on my sister's couch while my peers moved forward, I didn't know what I wanted — but
  I knew how it felt to be left behind. I stopped treating that feeling as evidence that I'd failed
  and started treating it as information: it was showing me exactly what I was hungry for. That
  urgency, uncomfortable as it was, became the fuel.
why_it_might_land: >-
  The comparison-spike user sees peers with momentum and feels the ache — "I want that feeling, not
  their specific life." Howes' story gives them a real person who felt the same specific ache, sat
  with it rather than suppressing it, and decoded it as useful information rather than proof of
  failure. The story doesn't moralize about comparison; it shows what using the feeling looks like
  from the inside.
